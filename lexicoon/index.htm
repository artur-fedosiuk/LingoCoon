<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon — Advanced Multilingual Dictionary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1108;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --gold: #c8963e;
    --gold-light: #e8c07a;
    --rust: #8b3a2a;
    --sage: #4a5e4a;
    --muted: #7a6e5e;
    --border: rgba(26,17,8,0.12);
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(200,150,62,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,58,42,0.06) 0%, transparent 60%);
  }

  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }

  .logo span {
    color: var(--gold);
  }

  .tagline {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .search-zone {
    max-width: 680px;
    margin: 3rem auto;
    padding: 0 1.5rem;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(26,17,8,0.06), 0 1px 4px rgba(26,17,8,0.04);
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .search-wrapper:focus-within {
    border-color: var(--gold);
    box-shadow: 0 4px 32px rgba(200,150,62,0.12), 0 1px 4px rgba(26,17,8,0.04);
  }

  input[type="text"] {
    flex: 1;
    padding: 1.1rem 1.4rem;
    font-size: 1.15rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
  }

  input::placeholder { color: var(--muted); font-style: italic; }

  button#searchBtn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 1.1rem 1.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  button#searchBtn:hover { background: var(--gold); }
  button#searchBtn:disabled { background: var(--muted); cursor: not-allowed; }

  .hint {
    text-align: center;
    margin-top: 0.8rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  #result-container {
    max-width: 780px;
    margin: 0 auto 4rem;
    padding: 0 1.5rem;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s, transform 0.5s;
  }

  #result-container.visible {
    opacity: 1;
    transform: none;
  }

  /* Language badges */
  .lang-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .lang-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem 1.4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .lang-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .lang-card.it::before { background: var(--rust); }
  .lang-card.en::before { background: var(--sage); }
  .lang-card.fr::before { background: var(--gold); }
  .lang-card.uk::before { background: #3a6bbf; }

  .lang-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .lang-word {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }

  .lang-phonetic {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.2rem;
    font-style: italic;
  }

  /* Sections */
  .section {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 1.4rem;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
  }

  .section-icon {
    font-size: 0.9rem;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-body {
    padding: 1.4rem;
    font-size: 0.95rem;
    line-height: 1.75;
    color: #2e2416;
  }

  .section-body p + p { margin-top: 0.8rem; }

  /* Examples */
  .examples-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .example-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.6rem 1rem;
    padding: 0.9rem 1.2rem;
    background: var(--cream);
    border-radius: 3px;
    border-left: 3px solid var(--gold);
  }

  .ex-flag { font-size: 1rem; }

  .ex-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--ink);
  }

  .ex-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 3rem 1rem;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  /* Error */
  .error-box {
    background: #fdf0ee;
    border: 1px solid rgba(139,58,42,0.2);
    border-radius: 4px;
    padding: 1.4rem;
    color: var(--rust);
    font-size: 0.9rem;
    text-align: center;
  }

  /* Nuance pills */
  .nuance-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .pill {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.3rem 0.9rem;
    font-size: 0.8rem;
    color: var(--ink);
  }

  .divider {
    text-align: center;
    padding: 2rem 0 1rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.3em;
  }

  @media (max-width: 560px) {
    .lang-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Lexi<span>con</span></div>
  <div class="tagline">Advanced Multilingual Dictionary</div>
</header>

<div class="search-zone">
  <div class="search-wrapper">
    <input type="text" id="wordInput" placeholder="Enter a word or phrase…" autocomplete="off" />
    <button id="searchBtn" onclick="search()">Search</button>
  </div>
  <div class="hint">Press Enter or click Search — works with single words, phrases and technical terms</div>
</div>

<div id="result-container"></div>

<script>
const input = document.getElementById('wordInput');
const btn = document.getElementById('searchBtn');
const container = document.getElementById('result-container');

input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function search() {
  const word = input.value.trim();
  if (!word) return;

  btn.disabled = true;
  container.classList.remove('visible');
  container.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Looking it up…</div>
    </div>`;
  setTimeout(() => container.classList.add('visible'), 10);

  const prompt = `You are an advanced multilingual dictionary. The user entered: "${word}"

Respond ONLY with a single valid JSON object (no text before or after), with this exact structure:

{
  "italian": { "word": "...", "phonetic": "..." },
  "english": { "word": "...", "phonetic": "..." },
  "french": { "word": "...", "phonetic": "..." },
  "ukrainian": { "word": "...", "phonetic": "..." },
  "category": "e.g. noun, verb, idiomatic expression, technical term, etc.",
  "essence": "A brilliant, dense sentence that captures the heart of the meaning — not a textbook definition, but something illuminating. Max 2 lines.",
  "explanation": "A fluid, intelligent, non-didactic explanation. Explain the concept as a very cultured person speaking to a curious friend. No bullet points. 3–5 sentences.",
  "nuances": ["nuance 1", "nuance 2", "nuance 3"],
  "usage": "Where and when it is used: formal, informal, written, spoken, slang, etc. No lists.",
  "curiosity": "An interesting fact, surprising etymology, or unexpected connection — something worth knowing. Optional but preferred.",
  "examples": [
    { "lang": "it", "flag": "🇮🇹", "text": "Example sentence in natural Italian, contextualised." },
    { "lang": "en", "flag": "🇬🇧", "text": "Example sentence in natural English." },
    { "lang": "fr", "flag": "🇫🇷", "text": "Phrase exemple en fran\u00e7ais naturel." },
    { "lang": "uk", "flag": "🇺🇦", "text": "\u041f\u0440\u0438\u043a\u043b\u0430\u0434 \u0440\u0435\u0447\u0435\u043d\u043d\u044f \u0443\u043a\u0440\u0430\u0457\u043d\u0441\u044c\u043a\u043e\u044e \u043c\u043e\u0432\u043e\u044e." }
  ]
}

Rules: lively answers, not pedantic. No repetition between sections. Valid JSON, no markdown.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const d = JSON.parse(clean);
    render(d, word);
  } catch(e) {
    container.innerHTML = `<div class="error-box">Error fetching data. Please try again in a few seconds.</div>`;
  }
  btn.disabled = false;
}

function render(d, query) {
  const html = `
    <div class="divider">· · ·</div>

    <div class="lang-row">
      <div class="lang-card it">
        <div class="lang-label">🇮🇹 Italian</div>
        <div class="lang-word">${d.italian.word}</div>
        <div class="lang-phonetic">${d.italian.phonetic}</div>
      </div>
      <div class="lang-card en">
        <div class="lang-label">🇬🇧 English</div>
        <div class="lang-word">${d.english.word}</div>
        <div class="lang-phonetic">${d.english.phonetic}</div>
      </div>
      <div class="lang-card fr">
        <div class="lang-label">🇫🇷 French</div>
        <div class="lang-word">${d.french.word}</div>
        <div class="lang-phonetic">${d.french.phonetic}</div>
      </div>
      <div class="lang-card uk">
        <div class="lang-label">🇺🇦 Ukrainian</div>
        <div class="lang-word">${d.ukrainian.word}</div>
        <div class="lang-phonetic">${d.ukrainian.phonetic}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon">✦</span>
        <span class="section-title">In essence</span>
      </div>
      <div class="section-body">
        <p><em>${d.essence}</em></p>
        <p style="margin-top:0.6rem; font-size:0.75rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase;">${d.category}</p>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon">◎</span>
        <span class="section-title">Explanation</span>
      </div>
      <div class="section-body">${d.explanation}</div>
    </div>

    ${d.nuances && d.nuances.length ? `
    <div class="section">
      <div class="section-header">
        <span class="section-icon">◈</span>
        <span class="section-title">Nuances</span>
      </div>
      <div class="section-body">
        <div class="nuance-pills">
          ${d.nuances.map(s => `<span class="pill">${s}</span>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-header">
        <span class="section-icon">◇</span>
        <span class="section-title">When to use it</span>
      </div>
      <div class="section-body">${d.usage}</div>
    </div>

    ${d.curiosity ? `
    <div class="section">
      <div class="section-header">
        <span class="section-icon">◉</span>
        <span class="section-title">Worth knowing</span>
      </div>
      <div class="section-body">${d.curiosity}</div>
    </div>` : ''}

    <div class="section">
      <div class="section-header">
        <span class="section-icon">▷</span>
        <span class="section-title">Examples in context</span>
      </div>
      <div class="section-body">
        <div class="examples-list">
          ${d.examples.map(ex => `
            <div class="example-item">
              <span class="ex-flag">${ex.flag}</span>
              <div>
                <div class="ex-label">${ex.lang === 'it' ? 'Italian' : ex.lang === 'en' ? 'English' : ex.lang === 'fr' ? 'Fran\u00e7ais' : 'Ukrainian'}</div>
                <div class="ex-text">${ex.text}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  container.classList.remove('visible');
  container.innerHTML = html;
  setTimeout(() => container.classList.add('visible'), 10);
}
</script>
</body>
</html>
