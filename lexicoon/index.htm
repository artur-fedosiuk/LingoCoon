<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon — Dizionario Avanzato</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1108;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --gold: #c8963e;
    --gold-light: #e8c07a;
    --rust: #8b3a2a;
    --sage: #4a5e4a;
    --muted: #7a6e5e;
    --border: rgba(26,17,8,0.12);
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(200,150,62,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,58,42,0.06) 0%, transparent 60%);
  }

  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
  }

  .logo span {
    color: var(--gold);
  }

  .tagline {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .search-zone {
    max-width: 680px;
    margin: 3rem auto;
    padding: 0 1.5rem;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(26,17,8,0.06), 0 1px 4px rgba(26,17,8,0.04);
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .search-wrapper:focus-within {
    border-color: var(--gold);
    box-shadow: 0 4px 32px rgba(200,150,62,0.12), 0 1px 4px rgba(26,17,8,0.04);
  }

  input[type="text"] {
    flex: 1;
    padding: 1.1rem 1.4rem;
    font-size: 1.15rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    border: none;
    outline: none;
    background: transparent;
    color: var(--ink);
  }

  input::placeholder { color: var(--muted); font-style: italic; }

  button#searchBtn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 1.1rem 1.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  button#searchBtn:hover { background: var(--gold); }
  button#searchBtn:disabled { background: var(--muted); cursor: not-allowed; }

  .hint {
    text-align: center;
    margin-top: 0.8rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  #result-container {
    max-width: 780px;
    margin: 0 auto 4rem;
    padding: 0 1.5rem;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s, transform 0.5s;
  }

  #result-container.visible {
    opacity: 1;
    transform: none;
  }

  /* Language badges */
  .lang-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .lang-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem 1.4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .lang-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .lang-card.it::before { background: var(--rust); }
  .lang-card.en::before { background: var(--sage); }
  .lang-card.fr::before { background: var(--gold); }

  .lang-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .lang-word {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }

  .lang-phonetic {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.2rem;
    font-style: italic;
  }

  /* Sections */
  .section {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 1.4rem;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
  }

  .section-icon {
    font-size: 0.9rem;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-body {
    padding: 1.4rem;
    font-size: 0.95rem;
    line-height: 1.75;
    color: #2e2416;
  }

  .section-body p + p { margin-top: 0.8rem; }

  /* Examples */
  .examples-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .example-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.6rem 1rem;
    padding: 0.9rem 1.2rem;
    background: var(--cream);
    border-radius: 3px;
    border-left: 3px solid var(--gold);
  }

  .ex-flag { font-size: 1rem; }

  .ex-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--ink);
  }

  .ex-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 3rem 1rem;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  /* Error */
  .error-box {
    background: #fdf0ee;
    border: 1px solid rgba(139,58,42,0.2);
    border-radius: 4px;
    padding: 1.4rem;
    color: var(--rust);
    font-size: 0.9rem;
    text-align: center;
  }

  /* Nuance pills */
  .nuance-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .pill {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.3rem 0.9rem;
    font-size: 0.8rem;
    color: var(--ink);
  }

  .divider {
    text-align: center;
    padding: 2rem 0 1rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.3em;
  }

  @media (max-width: 560px) {
    .lang-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Lexi<span>con</span></div>
  <div class="tagline">Dizionario Avanzato Multilingue</div>
</header>

<div class="search-zone">
  <div class="search-wrapper">
    <input type="text" id="wordInput" placeholder="Inserisci una parola o frase…" autocomplete="off" />
    <button id="searchBtn" onclick="search()">Cerca</button>
  </div>
  <div class="hint">Premi Invio o clicca Cerca — funziona con parole singole, frasi e termini tecnici</div>
</div>

<div id="result-container"></div>

<script>
const input = document.getElementById('wordInput');
const btn = document.getElementById('searchBtn');
const container = document.getElementById('result-container');

input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function search() {
  const word = input.value.trim();
  if (!word) return;

  btn.disabled = true;
  container.classList.remove('visible');
  container.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Consultando le fonti…</div>
    </div>`;
  setTimeout(() => container.classList.add('visible'), 10);

  const prompt = `Sei un dizionario avanzato multilingue. L'utente ha inserito: "${word}"

Rispondi SOLO con un oggetto JSON valido (nessun testo prima o dopo), con questa struttura esatta:

{
  "italiano": { "parola": "...", "fonetica": "..." },
  "inglese": { "parola": "...", "fonetica": "..." },
  "francese": { "parola": "...", "fonetica": "..." },
  "categoria": "es. sostantivo, verbo, espressione idiomatica, termine tecnico, ecc.",
  "essenza": "Una frase brillante e densa che cattura il cuore del significato — non una definizione scolastica, ma qualcosa che illumina. Max 2 righe.",
  "spiegazione": "Spiegazione fluida, intelligente e non didattica. Spiega il concetto come farebbe qualcuno di molto colto parlando a un amico curioso. Evita elenchi puntati. 3-5 frasi.",
  "sfumature": ["sfumatura 1", "sfumatura 2", "sfumatura 3"],
  "usi": "Dove e quando si usa: contesti formali, informali, scritto, parlato, gergale, ecc. Senza elenchi.",
  "curiosita": "Un fatto interessante, un'etimologia sorprendente, una connessione inaspettata — qualcosa che vale la pena sapere. Opzionale ma preferibile.",
  "esempi": [
    { "lingua": "it", "bandiera": "🇮🇹", "testo": "Frase esempio in italiano naturale e contestualizzata." },
    { "lingua": "en", "bandiera": "🇬🇧", "testo": "Example sentence in natural English." },
    { "lingua": "fr", "bandiera": "🇫🇷", "testo": "Phrase exemple en français naturel." }
  ]
}

Regole: risposte vivaci, non pedanti. Niente ripetizioni tra le sezioni. JSON valido, nessun markdown.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const d = JSON.parse(clean);
    render(d, word);
  } catch(e) {
    container.innerHTML = `<div class="error-box">Errore nel recupero dei dati. Riprova tra qualche secondo.</div>`;
  }
  btn.disabled = false;
}

function render(d, query) {
  const html = `
    <div class="divider">· · ·</div>

    <div class="lang-row">
      <div class="lang-card it">
        <div class="lang-label">🇮🇹 Italiano</div>
        <div class="lang-word">${d.italiano.parola}</div>
        <div class="lang-phonetic">${d.italiano.fonetica}</div>
      </div>
      <div class="lang-card en">
        <div class="lang-label">🇬🇧 Inglese</div>
        <div class="lang-word">${d.inglese.parola}</div>
        <div class="lang-phonetic">${d.inglese.fonetica}</div>
      </div>
      <div class="lang-card fr">
        <div class="lang-label">🇫🇷 Francese</div>
        <div class="lang-word">${d.francese.parola}</div>
        <div class="lang-phonetic">${d.francese.fonetica}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon">✦</span>
        <span class="section-title">In sostanza</span>
      </div>
      <div class="section-body">
        <p><em>${d.essenza}</em></p>
        <p style="margin-top:0.6rem; font-size:0.75rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase;">${d.categoria}</p>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon">◎</span>
        <span class="section-title">Spiegazione</span>
      </div>
      <div class="section-body">${d.spiegazione}</div>
    </div>

    ${d.sfumature && d.sfumature.length ? `
    <div class="section">
      <div class="section-header">
        <span class="section-icon">◈</span>
        <span class="section-title">Sfumature</span>
      </div>
      <div class="section-body">
        <div class="nuance-pills">
          ${d.sfumature.map(s => `<span class="pill">${s}</span>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-header">
        <span class="section-icon">◇</span>
        <span class="section-title">Quando si usa</span>
      </div>
      <div class="section-body">${d.usi}</div>
    </div>

    ${d.curiosita ? `
    <div class="section">
      <div class="section-header">
        <span class="section-icon">◉</span>
        <span class="section-title">Vale la pena sapere</span>
      </div>
      <div class="section-body">${d.curiosita}</div>
    </div>` : ''}

    <div class="section">
      <div class="section-header">
        <span class="section-icon">▷</span>
        <span class="section-title">Esempi in contesto</span>
      </div>
      <div class="section-body">
        <div class="examples-list">
          ${d.esempi.map(ex => `
            <div class="example-item">
              <span class="ex-flag">${ex.bandiera}</span>
              <div>
                <div class="ex-label">${ex.lingua === 'it' ? 'Italiano' : ex.lingua === 'en' ? 'English' : 'Français'}</div>
                <div class="ex-text">${ex.testo}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  container.classList.remove('visible');
  container.innerHTML = html;
  setTimeout(() => container.classList.add('visible'), 10);
}
</script>
</body>
</html>
